<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Phu Quoc Smart Travel - Hải & Hiền Family</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            touch-action: manipulation;
            /* Fix cho iOS: Sử dụng dvh để tính toán chiều cao chính xác */
            height: 100vh;
            height: 100dvh; 
        }
        
        #map-container {
            position: relative;
            flex: 1;
            min-height: 0; /* Quan trọng cho Flexbox trên Webkit/Safari */
        }

        #map { 
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1; 
            background: #f8fafc; 
        }

        /* Label chữ trong suốt trên bản đồ - Trả về size cũ (12px) */
        .transparent-label {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: #334155;
            font-weight: 700;
            font-size: 12px;
            text-shadow: 0px 0px 4px rgba(255,255,255,0.9);
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }

        .label-icon {
            font-size: 20px; /* Trả về size cũ */
            margin-bottom: 2px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Hiệu ứng khi điểm được chọn: Chuyển màu ĐỎ */
        .active-marker .label-icon {
            color: #ef4444 !important;
            transform: scale(1.4) translateY(-5px);
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .active-marker span {
            color: #ef4444 !important;
            font-size: 14px;
        }

        .sidebar-content {
            height: calc(100% - 160px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Cuộn mượt trên iOS */
        }

        .location-item {
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .location-item.selected {
            border-color: #ef4444;
            background-color: #fff1f2;
        }

        .day-tab.active-1 { background-color: #2563eb; color: white; border-color: #2563eb; }
        .day-tab.active-2 { background-color: #f97316; color: white; border-color: #f97316; }

        @media (max-width: 768px) {
            .mobile-map-container { height: 45%; flex: none; }
            .mobile-list-container { height: 55%; flex: none; }
            .transparent-label { font-size: 10px; }
            .label-icon { font-size: 16px; }
        }
    </style>
</head>
<body class="bg-white flex flex-col md:flex-row overflow-hidden">

    <!-- SIDEBAR / LIST VIEW -->
    <aside class="w-full md:w-[400px] bg-white border-r flex flex-col z-20 shadow-2xl order-2 md:order-1 mobile-list-container">
        <div class="p-4 md:p-6 border-b">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-map-location-dot text-blue-600 text-xl md:text-2xl"></i>
                    <h1 class="text-lg md:text-xl font-extrabold text-slate-800 tracking-tight uppercase">PHÚ QUỐC 2026</h1>
                </div>
                <div class="md:hidden text-[9px] font-bold text-slate-400 uppercase tracking-widest bg-slate-100 px-3 py-1 rounded-full">Hải • Hiền • Hân</div>
            </div>
            
            <div class="flex gap-2 p-1 bg-slate-100 rounded-2xl">
                <button id="btnDay1" onclick="switchDay(1)" class="day-tab active-1 flex-1 py-2 md:py-2.5 rounded-xl font-bold text-[10px] md:text-xs transition-all uppercase">Ngày 1: Bắc Đảo</button>
                <button id="btnDay2" onclick="switchDay(2)" class="day-tab flex-1 py-2 md:py-2.5 rounded-xl font-bold text-[10px] md:text-xs transition-all text-slate-500 uppercase">Ngày 2: Nam Đảo</button>
            </div>
        </div>

        <div class="sidebar-content p-3 md:p-4 space-y-4">
            <div id="itinerary-list" class="space-y-2 md:space-y-3">
                <!-- JS handles injection -->
            </div>

            <!-- Notes Section -->
            <div class="pt-6 border-t border-slate-100 pb-12">
                <h3 class="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-3">Lưu ý quan trọng</h3>
                <div class="grid grid-cols-1 gap-2">
                    <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                        <div class="flex items-center gap-2 text-blue-600 mb-1">
                            <i class="fa-solid fa-plane text-[10px]"></i>
                            <span class="text-[10px] font-bold uppercase">Chuyến về: VN1822</span>
                        </div>
                        <p class="text-[10px] text-slate-600 italic leading-tight">Checkout Meliá lúc 06:30 sáng 28/04 để kịp bay 09:35.</p>
                    </div>
                    <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100">
                        <div class="flex items-center gap-2 text-amber-600 mb-1">
                            <i class="fa-solid fa-ticket text-[10px]"></i>
                            <span class="text-[10px] font-bold uppercase">Vé tham quan</span>
                        </div>
                        <p class="text-[10px] text-amber-700 leading-tight">Cần mua vé Safari, VinWonders, Cầu Hôn. Ga An Thới chơi ngoài miễn phí.</p>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAP VIEW -->
    <main id="map-container" class="order-1 md:order-2 mobile-map-container">
        <div id="map"></div>
        
        <!-- Status Indicator -->
        <div class="absolute top-4 right-4 z-[1000] pointer-events-none">
            <div class="bg-white/80 backdrop-blur-md px-3 py-1.5 rounded-full shadow-lg border border-white flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
                <span class="text-[9px] font-black text-slate-700 uppercase tracking-widest">Bản đồ trực tuyến</span>
            </div>
        </div>
    </main>

    <script>
        const tripData = {
            1: {
                color: "#2563eb",
                center: [10.35, 103.88],
                zoom: 12,
                locations: [
                    { 
                        id: 'safari', name: 'Vinpearl Safari', time: '09:00 - 12:00', icon: 'fa-paw', coords: [10.3345, 103.8880], 
                        desc: 'Ngắm thú hoang dã trên xe bus chuyên dụng. Rất thú vị cho bé Bảo Hân.',
                        feature: 'Trải nghiệm "nhốt người thả thú" độc nhất.',
                        mapUrl: 'https://www.google.com/maps/search/?api=1&query=Vinpearl+Safari+Phu+Quoc'
                    },
                    { 
                        id: 'rachvem', name: 'Làng Chài Rạch Vẹm', time: '12:30 - 14:30', icon: 'fa-fish', coords: [10.3850, 103.9250], 
                        desc: 'Ăn hải sản nhà bè và chụp ảnh cùng hàng ngàn sao biển đỏ.',
                        feature: 'Vương quốc sao biển đẹp nhất Phú Quốc.',
                        mapUrl: 'https://www.google.com/maps/search/?api=1&query=Rach+Vem+Phu+Quoc'
                    },
                    { 
                        id: 'melia_swim', name: 'Meliá (Bơi & Nghỉ)', time: '15:00 - 18:30', icon: 'fa-person-swimming', coords: [10.3340, 103.8550], 
                        desc: 'Bơi lội ngắm hoàng hôn đỏ rực tại resort.',
                        feature: 'Tận hưởng bãi biển riêng cao cấp của Meliá.',
                        mapUrl: 'https://www.google.com/maps/search/?api=1&query=Melia+Vinpearl+Phu+Quoc'
                    },
                    { 
                        id: 'grandworld', name: 'Grand World', time: '19:00 - 22:00', icon: 'fa-city', coords: [10.3240, 103.8580], 
                        desc: 'Show Venice (21:45), Nhà Tre, Kênh đào Venice.',
                        feature: 'Thành phố không ngủ rực rỡ sắc màu.',
                        mapUrl: 'https://www.google.com/maps/search/?api=1&query=Grand+World+Phu+Quoc'
                    }
                ]
            },
            2: {
                color: "#f97316",
                center: [10.18, 103.95],
                zoom: 11,
                locations: [
                    { 
                        id: 'winwonders', name: 'Cung Điện Hải Vương', time: '09:00 - 12:30', icon: 'fa-turtle', coords: [10.3300, 103.8500], 
                        desc: 'Thủy cung rùa khổng lồ tại VinWonders.',
                        feature: 'Top 5 thủy cung lớn nhất thế giới.',
                        mapUrl: 'https://www.google.com/maps/search/?api=1&query=VinWonders+Phu+Quoc'
                    },
                    { 
                        id: 'gaan_thoi', name: 'Ga An Thới (Rome)', time: '14:00 - 15:00', icon: 'fa-columns', coords: [10.0100, 104.0050], 
                        desc: 'Check-in kiến trúc đấu trường La Mã phía ngoài ga cáp treo.',
                        feature: 'Kiến trúc cổ điển cực sang chảnh (Miễn phí).',
                        mapUrl: 'https://www.google.com/maps/search/?api=1&query=Cap+treo+Hon+Thom'
                    },
                    { 
                        id: 'sunset_town', name: 'Thị Trấn Hoàng Hôn', time: '15:00 - 17:30', icon: 'fa-sun', coords: [10.0150, 104.0100], 
                        desc: 'Dạo phố Địa Trung Hải rực rỡ, ngắm hoàng hôn trên Cầu Hôn.',
                        feature: 'Tọa độ lãng mạn nhất vào cuối ngày.',
                        mapUrl: 'https://www.google.com/maps/search/?api=1&query=Sunset+Town+Phu+Quoc'
                    },
                    { 
                        id: 'duongdong', name: 'TT Dương Đông', time: '18:00 - 20:30', icon: 'fa-bag-shopping', coords: [10.2170, 103.9600], 
                        desc: 'Mua đặc sản tiêu, nước mắm, rượu sim và ăn tối hải sản.',
                        feature: 'Thiên đường đặc sản & ẩm thực làm quà.',
                        mapUrl: 'https://www.google.com/maps/search/?api=1&query=Cho+dem+Phu+Quoc'
                    }
                ]
            }
        };

        // Initialize Map
        const map = L.map('map', { zoomControl: false }).setView(tripData[1].center, tripData[1].zoom);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png', {
            attribution: '© CartoDB'
        }).addTo(map);
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let currentMarkers = {};
        let currentDay = 1;

        function renderDay(day) {
            for (let id in currentMarkers) map.removeLayer(currentMarkers[id]);
            currentMarkers = {};

            const data = tripData[day];
            const listEl = document.getElementById('itinerary-list');
            listEl.innerHTML = '';

            data.locations.forEach((loc) => {
                const customIcon = L.divIcon({
                    className: 'transparent-label',
                    html: `<i class="fa-solid ${loc.icon} label-icon" style="color: ${data.color}"></i><span>${loc.name}</span>`,
                    iconSize: [120, 40],
                    iconAnchor: [60, 20]
                });

                const marker = L.marker(loc.coords, { icon: customIcon }).addTo(map);
                marker.on('click', () => focusLocation(loc.id, day));
                currentMarkers[loc.id] = marker;

                // Sidebar Item
                const item = document.createElement('div');
                item.id = `item-${loc.id}`;
                item.className = `location-item p-4 bg-white border-2 border-slate-50 rounded-3xl cursor-pointer shadow-sm flex flex-col gap-2`;
                item.onclick = () => focusLocation(loc.id, day);
                item.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-xl flex items-center justify-center text-white shadow-lg" style="background-color: ${data.color}">
                                <i class="fa-solid ${loc.icon} text-[10px]"></i>
                            </div>
                            <div>
                                <h4 class="text-[11px] font-black text-slate-800 uppercase tracking-tighter">${loc.name}</h4>
                                <p class="text-[9px] font-bold text-slate-400">${loc.time}</p>
                            </div>
                        </div>
                        <a href="${loc.mapUrl}" target="_blank" class="bg-blue-600 text-white px-2 py-1 rounded-lg text-[8px] font-black uppercase active:scale-95" onclick="event.stopPropagation()">Map</a>
                    </div>
                    <p class="text-[11px] text-slate-500 leading-snug font-medium">${loc.desc}</p>
                    <div class="flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full" style="background-color: ${data.color}"></span>
                        <p class="text-[9px] font-black text-slate-700 italic">${loc.feature}</p>
                    </div>
                `;
                listEl.appendChild(item);
            });

            const isMobile = window.innerWidth < 768;
            map.flyTo(data.center, isMobile ? data.zoom - 0.5 : data.zoom, { duration: 1.5 });
        }

        function focusLocation(id, day) {
            const loc = tripData[day].locations.find(l => l.id === id);
            
            document.querySelectorAll('.location-item').forEach(el => el.classList.remove('selected'));
            const activeItem = document.getElementById(`item-${id}`);
            if (activeItem) {
                activeItem.classList.add('selected');
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            for (let mid in currentMarkers) {
                const el = currentMarkers[mid].getElement();
                if (el) el.classList.remove('active-marker');
            }
            const marker = currentMarkers[id];
            const markerEl = marker.getElement();
            if (markerEl) markerEl.classList.add('active-marker');
            
            map.flyTo(loc.coords, 14, { duration: 1.2 });
        }

        function switchDay(day) {
            currentDay = day;
            document.getElementById('btnDay1').className = `day-tab flex-1 py-2 rounded-xl font-bold text-[10px] md:text-xs transition-all ${day === 1 ? 'active-1 shadow-md' : 'text-slate-500'}`;
            document.getElementById('btnDay2').className = `day-tab flex-1 py-2 rounded-xl font-bold text-[10px] md:text-xs transition-all ${day === 2 ? 'active-2 shadow-md' : 'text-slate-500'}`;
            renderDay(day);
        }

        window.onload = () => {
            renderDay(1);
            // Cập nhật lại kích thước map sau khi load xong để tránh lỗi grey map trên iOS
            setTimeout(() => map.invalidateSize(), 500);
        };

        window.addEventListener('resize', () => {
            map.invalidateSize();
        });
    </script>
</body>
</html>
